name: Publish BOM and Properties to GitHub Packages

on:
  push:
    branches:
      - develop

  pull_request:
    branches:
      - develop
      
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
          server-id: github

      - name: Build & Publish
        run: mvn -B clean install deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
