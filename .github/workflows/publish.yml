name: Publish BOM and Properties to GitHub Packages

on:
  push:
    branches:
      - develop
    paths-ignore:
      - '.github/workflows/**'
      - 'openspec/**'
      - '**.md'

  pull_request:
    branches:
      - develop
    paths-ignore:
      - '.github/workflows/**'
      - 'openspec/**'
      - '**.md'
      
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven
          server-id: github

      - name: Set up Maven 3.9.14
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.14

      - name: Configure Maven authentication
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
              <server>
                <id>github-bom</id>
                <username>${{ github.actor }}</username>
                <password>${{ secrets.GITHUB_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Validate POM is well-formed
        run: mvn -B validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check all dependencyManagement versions are property-backed
        run: |
          # Extract only the <dependencyManagement> block and check for hardcoded versions
          HARDCODED=$(awk '/<dependencyManagement>/,/<\/dependencyManagement>/' pom.xml \
            | grep -oP '(?<=<version>)(?!\$\{)[^<]+' || true)
          if [ -n "$HARDCODED" ]; then
            echo "ERROR: Hardcoded version(s) found in <dependencyManagement>:"
            echo "$HARDCODED"
            exit 1
          fi
          echo "All dependencyManagement versions are property-backed."

      - name: Build and resolve BOM dependencies (synthetic validation project)
        run: |
          mvn -B install -N -DskipDependencyCheck=true -DskipTests=true -q
          mvn -B clean package -f validation/pom.xml -DskipDependencyCheck=true -DskipTests=true -q
          mvn -B dependency:copy-dependencies -f validation/pom.xml -DoutputDirectory=target/dependency -DincludeScope=runtime -DskipDependencyCheck=true -q
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: CVE Scan
        uses: IZGateway/izg-dependency-scripts/.github/actions/cve-scan@main
        timeout-minutes: 15
        with:
          project-name: izgw-bom-validation
          scan-path: validation
          suppression-file: /github/workspace/dependency-suppression.xml
          report-output-dir: dependency-check-report
          oss-index-username: ${{ secrets.OSS_INDEX_USERNAME }}
          oss-index-password: ${{ secrets.OSS_INDEX_PASSWORD }}
          nvd-api-key: ${{ secrets.NVDAPIKEY }}
          artifact-name: dependency-check-report

      - name: Build & Publish
        run: mvn -B clean install deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
